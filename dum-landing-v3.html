<!-- === Formulaire de commande === -->
<section id="order-section" class="order-form-section">
    <div class="form-container order-mockup-form">
        <!-- Formulaire -->
        <form id="orderForm">

            <input type="text" id="fullName" name="fullName" placeholder="الاسم الكامل" required
                oninvalid="this.setCustomValidity('الرجاء إدخال الاسم الكامل')" oninput="this.setCustomValidity('')">

            <input dir="rtl" type="tel" id="phone" name="phone" placeholder="رقم الهاتف" required
                pattern="^\+?\d{10,15}$" oninvalid="this.setCustomValidity('الرجاء إدخال رقم هاتف صحيح')"
                oninput="this.setCustomValidity('')">

            <input type="text" id="departement" name="departement" placeholder="الولاية" required
                oninvalid="this.setCustomValidity('الرجاء إدخال الولاية')" oninput="this.setCustomValidity('')">

            <select id="offer" name="offer" class="tajawal-medium" required
                oninvalid="this.setCustomValidity('الرجاء اختيار الحجم')" oninput="this.setCustomValidity('')">
                <option value="" selected disabled>إختر الحجم</option>
                <option value="3kg_offer">باقة 3 كجم (2 كجم + 1 كجم هدية) - 5000 د.ج</option>
                <option value="500g">500 غرام - 1300 دج</option>
                <option value="1kg">1 كجم - 2500 دج</option>
            </select>

            <!-- Hidden fields -->
            <input type="hidden" name="content_id" value="doum_powder">
            <input type="hidden" name="content_name" value="مسحوق الدوم">
            <input type="hidden" name="currency" value="DZD">
            <input type="hidden" name="price" id="price" value="">
            <input type="hidden" name="offer_label" id="offer_label" value="">

            <!-- Points de réassurance -->
            <img src="landing-v3/img/trust-prebuttons.webp" alt="متوفر عبر واتساب - تواصل سريع - الطلب في أقل من دقيقة"
                class="trust-prebuttons" />

            <button type="submit" class="btn tajawal-bold">
                إرسال الطلب
            </button>

            <a href="https://wa.me/213697275528" class="whatsapp-img-btn" target="_blank" rel="noopener"
                aria-label="واتساب"></a>

        </form>

        <div id="error" class="error" hidden>
            حدث خطأ أثناء إرسال طلبك. يُرجى التحقق من المعلومات والمحاولة مجددًا.
        </div>

        <!-- Badges bas -->
        <img src="landing-v3/img/trust-afterbuttons.webp" alt="بياناتك آمنة - تأكيد سريع للطلب - دعم العملاء جاهز"
            class="trust-afterbuttons" />

    </div>
</section>
